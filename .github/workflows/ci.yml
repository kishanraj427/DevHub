name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: devhub
          POSTGRES_PASSWORD: devhub123
          POSTGRES_DB: devhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://devhub:devhub123@localhost:5432/devhub
      JWT_SECRET: ci_test_secret

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun i

      - run: bunx prisma generate

      - run: bunx prisma db push

      - run: bun test
