version: "3.8"
services:
  postgres:
    image: postgres:15
    container_name: devhub_db
    environment:
      POSTGRES_USER: devhub
      POSTGRES_PASSWORD: devhub123
      POSTGRES_DB: devhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:latest
    container_name: devhub_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: ["valkey-server", "--appendonly", "yes"]

volumes:
  postgres_data:
  valkey_data:
