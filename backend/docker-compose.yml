version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: devhub_db
    environment:
      POSTGRES_USER: devhub
      POSTGRES_PASSWORD: devhub123
      POSTGRES_DB: devhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: